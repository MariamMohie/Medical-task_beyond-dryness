name: Build macOS Release

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.4'

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release app
        run: flutter build macos --release

      - name: Package app for download
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent "desktop_game_skincare.app" "desktop_game_skincare-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-game-skincare-macos
          path: build/macos/Build/Products/Release/desktop_game_skincare-macos.zip
